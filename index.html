<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TO-DO APP</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>TO-DO APP</h1>
        <h2>Welcome to your own Task Manager App</h2>
        <h3>Take control of your daily routine with this smart To-Do App. Add tasks, manage priorities, and track completed activities to stay productive every day.</h3>

    </header>


    <div class="todopart">


    <h3>Enter your task and click button to add:</h3> 
    
    <input type="text" placeholder="Enter Your Task" class="writetask">

    <button>ADD Task</button>

    <ul>
        <li>Task 1 <button class="delete">Delete</button></li>
        <li>Task 2 <button class="delete">Delete</button></li>
        <li>Task 3 <button class="delete">Delete</button></li>
    </ul>

    </div>
    <script src="todo.js"></script>
</body>
</html>
